services:
  - type: web
    name: cdo-training-system
    runtime: node
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build && cp -r dist ../backend/public
    startCommand: cd backend && node init-db.js && node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cdo-db
          property: connectionString

databases:
  - name: cdo-db
    databaseName: cdo_db
    user: cdo_user
    plan: free